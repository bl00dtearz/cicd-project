name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # =============================
  # ЧАСТЬ 2: Build + Test
  # =============================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Linter (flake8)
        run: flake8 app/ --max-line-length=100

      - name: Run Tests (pytest)
        run: pytest tests/ -v

      - name: Generate log file (Part 7)
        run: |
          mkdir -p logs
          python generate_logs.py
          cat logs/app.log

      - name: Run monitoring script (Part 7)
        run: python monitoring.py

      - name: Upload log as artifact (Part 7)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-logs
          path: logs/app.log

  # =============================
  # ЧАСТЬ 3: Security (DevSecOps)
  # =============================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: SAST - Bandit scan
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ --exit-zero

      - name: Dependency scan - pip-audit
        run: |
          pip install pip-audit
          pip install --upgrade pip
          pip-audit --format json -o pip-audit-report.json --ignore-vuln CVE-2026-3219 --ignore-vuln CVE-2026-6357 || true
          pip-audit --ignore-vuln CVE-2026-3219 --ignore-vuln CVE-2026-6357

      # =============================
      # ЧАСТЬ 4: Artifacts
      # =============================
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  # =============================
  # ЧАСТЬ 5: CD - Deploy
  # =============================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: security
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download security reports
        uses: actions/download-artifact@v4
        with:
          name: security-reports

      - name: Deploy to Staging (simulation)
        run: |
          echo "Deploying to STAGING environment..."
          echo "App version: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Staging deployment successful!"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Production (simulation)
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          echo "Deploying to PRODUCTION environment..."
          echo "App version: ${{ github.sha }}"
          echo "Secret configured: ${{ secrets.APP_SECRET != '' }}"
          echo "Production deployment successful!"